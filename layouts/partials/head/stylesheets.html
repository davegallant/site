<!-- Styles -->

{{ $styles := sort (resources.Match "css/src/*.css") "Name" | resources.Concat "css/bundle.css" | resources.ExecuteAsTemplate "css/bundle.css" . | css.PostCSS }}
{{ if hugo.IsProduction }}
  {{ $styles = $styles | minify | fingerprint "sha512" | resources.PostProcess }}
{{ end }}

<link rel="stylesheet" href="{{ $styles.RelPermalink }}" />
