<!doctype html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
  {{ partial "head/head.html" . }}
  <body>
    <div class="layout">
      {{ partialCached "header.html" . "header" }}
      <main>
        <div class="content">
          {{ block "main" . }}{{ end }}
        </div>
        {{ partial "sidebar.html" . }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
